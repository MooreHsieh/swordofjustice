<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜聯賽細節</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="detail-page">
  <header class="detail-top-header">
    <a class="detail-home" href="./stats.html">⌂</a>
    <div class="detail-top-vs">
      <div class="detail-vs-line" id="detailVsLine">讀取中...</div>
    </div>
    <div class="detail-top-actions">
      <a class="nav-btn" href="./stats.html">返回聯賽清單</a>
      <button id="logoutBtn" class="danger" type="button">登出</button>
    </div>
  </header>

  <div class="detail-app">
    <aside class="detail-sidebar">
      <button class="detail-nav-btn active" data-view="a" id="viewBtnA">🔵 我方</button>
      <button class="detail-nav-btn" data-view="b" id="viewBtnB">🔴 對方</button>
      <div id="sidebarCompare"></div>
      <div class="detail-mvp-box">
        <div class="detail-mvp-title">🏆 當場 MVP</div>
        <div id="mvpList" class="detail-mvp-list"></div>
      </div>
    </aside>

    <main class="detail-main">
      <section class="detail-toolbar">
        <div id="detailTabs">
          <div class="detail-tabs">
            <button class="detail-tab active" data-tab="overview"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="10" width="3" height="7" rx="1"/><rect x="8.5" y="6" width="3" height="11" rx="1"/><rect x="14" y="3" width="3" height="14" rx="1"/></svg></span>總覽</button>
            <button class="detail-tab" data-tab="job"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M6 16v-2.5A3.5 3.5 0 0 1 9.5 10h1A3.5 3.5 0 0 1 14 13.5V16"/><circle cx="10" cy="6.5" r="2.5"/><path d="M3 14.5A2.5 2.5 0 0 1 5.5 12M17 14.5A2.5 2.5 0 0 0 14.5 12"/></svg></span>職業</button>
            <button class="detail-tab" data-tab="dmg"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M10 3c1.2 2 .7 3.3-.1 4.4-.5.7-.8 1.4-.4 2.3.5 1.1 1.7 1.7 2.6 2.8.9 1.2 1.2 2.9.2 4.5"/><path d="M8.5 8.5c-1.6 1-3 2.3-3 4.5A4.5 4.5 0 0 0 10 17.5"/></svg></span>人傷</button>
            <button class="detail-tab" data-tab="eff"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M11.5 2.5 6 11h4l-1.5 6.5L14 9h-4l1.5-6.5Z"/></svg></span>塔傷</button>
            <button class="detail-tab" data-tab="heavy"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M6 16.5h8"/><path d="M7.2 14.5 10 12.2l2.8 2.3"/><path d="M8 8.5a2 2 0 1 1 4 0c0 1.3-.8 2-2 2s-2-.7-2-2Z"/><path d="M6.2 6.5a4 4 0 0 1 7.6 0"/></svg></span>承傷</button>
            <button class="detail-tab" data-tab="bone"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M6.5 6.5a1.8 1.8 0 1 1 2.6-2.6l5.4 5.4a1.8 1.8 0 1 1-2.6 2.6Z"/><path d="M5 9.5a1.6 1.6 0 1 1-2.3-2.3M15 10.5a1.6 1.6 0 1 0 2.3 2.3"/></svg></span>焚骨</button>
            <button class="detail-tab" data-tab="suwen"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M10 16.8 4.6 11.6a3.6 3.6 0 0 1 5.1-5l.3.3.3-.3a3.6 3.6 0 1 1 5.1 5Z"/><path d="M10 8v5M7.5 10.5h5"/></svg></span>素問</button>
            <button class="detail-tab" data-tab="cquadrant"><span class="tab-ic"><svg viewBox="0 0 20 20" fill="none"><path d="M4 6h9"/><path d="m10 3 3 3-3 3"/><path d="M16 14H7"/><path d="m10 11-3 3 3 3"/></svg></span>自選象限</button>
          </div>
          <div class="detail-tabs detail-tabs-advanced">
          </div>
        </div>
        <input id="playerSearch" class="detail-search" type="text" placeholder="🔍 搜尋玩家">
      </section>

      <section id="detailContent" class="detail-content"></section>
    </main>
  </div>
  <div id="status" aria-live="polite" style="display:none"></div>
  <script src="./config.js"></script>
  <script type="module" src="./stats-detail.js"></script>
</body>
</html>
