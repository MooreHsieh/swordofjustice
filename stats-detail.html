<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜聯賽細節</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="detail-page">
  <header class="detail-top-header">
    <a class="detail-home" href="./stats.html">⌂</a>
    <div class="detail-top-vs">
      <div class="detail-vs-line" id="detailVsLine">讀取中...</div>
    </div>
    <div class="detail-top-actions">
      <a class="nav-btn" href="./stats.html">返回聯賽清單</a>
      <button id="logoutBtn" class="danger" type="button">登出</button>
    </div>
  </header>

  <div class="detail-app">
    <aside class="detail-sidebar">
      <div class="detail-sb-title">場次</div>
      <button class="detail-nav-btn active" data-view="a" id="viewBtnA">🔵 我方</button>
      <button class="detail-nav-btn" data-view="b" id="viewBtnB">🔴 對方</button>
      <div class="detail-mvp-box">
        <div class="detail-mvp-title">🏆 當場 MVP</div>
        <div id="mvpList" class="detail-mvp-list"></div>
      </div>
    </aside>

    <main class="detail-main">
      <section class="detail-toolbar">
        <div id="detailTabs">
          <div class="detail-tabs">
            <button class="detail-tab active" data-tab="overview">📊 總覽</button>
            <button class="detail-tab" data-tab="job">🎭 職業</button>
            <button class="detail-tab" data-tab="kill">⚔ 擊殺</button>
            <button class="detail-tab" data-tab="dmg">🔥 輸出</button>
            <button class="detail-tab" data-tab="eff">⚡ 效率</button>
            <button class="detail-tab" data-tab="heal">💚 治療</button>
            <button class="detail-tab" data-tab="heavy">💀 重傷</button>
            <button class="detail-tab" data-tab="bone">🔥 焚骨</button>
            <button class="detail-tab" data-tab="suwen">🩷 素問</button>
          </div>
          <div class="detail-tabs detail-tabs-advanced">
            <button class="detail-tab" data-tab="radar">📡 職業雷達</button>
            <button class="detail-tab" data-tab="heatmap">🌡 貢獻熱力</button>
            <button class="detail-tab" data-tab="quadrant">🎯 素問象限</button>
            <button class="detail-tab" data-tab="cquadrant">🔀 自選象限</button>
          </div>
        </div>
        <input id="playerSearch" class="detail-search" type="text" placeholder="🔍 搜尋玩家">
      </section>

      <section id="detailContent" class="detail-content"></section>
    </main>
  </div>
  <div id="status" aria-live="polite" style="display:none"></div>
  <script src="./config.js"></script>
  <script type="module" src="./stats-detail.js"></script>
</body>
</html>
