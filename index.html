<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sword of Justice Auth</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffef9;
      --text: #1e1c18;
      --muted: #69655e;
      --accent: #0e7c66;
      --accent-hover: #0b6653;
      --danger: #b42318;
      --border: #d8d3c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #efe7d6 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #d8ece7 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-hover);
    }

    .secondary {
      background: #ede8dc;
      color: var(--text);
    }

    .danger {
      background: #fee4e2;
      color: var(--danger);
    }

    .oauth {
      background: #e6f1ee;
      color: #11463c;
    }

    .oauth:hover {
      background: #d2e7e1;
    }

    .divider {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin: 2px 0;
    }

    .oauth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    #status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    .panel {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    .summary-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      font-size: 0.9rem;
      color: var(--text);
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .file-list {
      margin: 0;
      padding-left: 18px;
      font-size: 0.84rem;
      color: #4d493f;
    }
    .file-list li {
      margin: 2px 0;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #ece7dd;
      text-align: left;
      white-space: nowrap;
    }

    thead th {
      background: #f7f3ea;
      color: #4d493f;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>登入系統</h1>
    <p>先完成 GitHub Pages + Supabase 的基本會員登入。</p>

    <section id="authArea" class="stack">
      <div class="divider">請選擇社群登入</div>
      <div class="row">
        <button id="googleLoginBtn" class="oauth oauth-btn" type="button" aria-label="使用 Google 登入">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-.9 2.2-1.9 2.9l3 2.3c1.7-1.6 2.7-4 2.7-6.9 0-.7-.1-1.4-.2-2.1H12z"/>
            <path fill="#34A853" d="M12 22c2.4 0 4.4-.8 5.9-2.2l-3-2.3c-.8.6-1.8 1-2.9 1-2.3 0-4.3-1.6-5-3.7H3.9v2.4C5.4 20.2 8.4 22 12 22z"/>
            <path fill="#4A90E2" d="M7 14.8c-.2-.6-.3-1.2-.3-1.8s.1-1.2.3-1.8V8.8H3.9C3.3 10 3 11 3 13s.3 3 .9 4.2L7 14.8z"/>
            <path fill="#FBBC05" d="M12 7.5c1.3 0 2.5.5 3.4 1.3l2.6-2.6C16.4 4.8 14.4 4 12 4 8.4 4 5.4 5.8 3.9 8.8L7 11.2c.7-2.1 2.7-3.7 5-3.7z"/>
          </svg>
          <span>Google 登入</span>
        </button>
        <button id="discordLoginBtn" class="oauth oauth-btn" type="button" aria-label="使用 Discord 登入">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#5865F2" d="M20.3 5.4A16.9 16.9 0 0 0 16.1 4c-.2.4-.5 1-.7 1.4a15.8 15.8 0 0 0-4.8 0c-.2-.4-.5-1-.7-1.4-1.5.2-2.9.7-4.2 1.4C3 9.1 2.3 12.7 2.6 16.2a17 17 0 0 0 5.1 2.6c.4-.6.8-1.2 1-1.9-.6-.2-1.2-.5-1.7-.8.1-.1.2-.2.3-.2 3.3 1.6 6.9 1.6 10.1 0l.3.2c-.5.3-1.1.6-1.7.8.3.7.6 1.3 1 1.9 1.9-.5 3.6-1.4 5.1-2.6.4-4.1-.6-7.7-2.8-10.8zM9.9 14.1c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2zm4.2 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2z"/>
          </svg>
          <span>Discord 登入</span>
        </button>
      </div>
    </section>

    <section id="userArea" class="stack hidden">
      <p>已登入：<strong id="userEmail"></strong></p>
      <p>登入方式：<strong id="providerName"></strong></p>
      <button id="logoutBtn" class="danger" type="button">登出</button>

      <section class="panel stack">
        <p>幫會聯賽</p>
        <div class="grid-2">
          <div class="field">
            <label for="guildAInput">幫會 A</label>
            <input id="guildAInput" type="text" placeholder="例如：有夢最美">
          </div>
          <div class="field">
            <label for="guildBInput">幫會 B</label>
            <input id="guildBInput" type="text" placeholder="例如：春夜星河">
          </div>
          <div class="field">
            <label for="matchDateInput">日期</label>
            <input id="matchDateInput" type="date">
          </div>
          <div class="field">
            <label for="matchRoundInput">場次</label>
            <input id="matchRoundInput" type="number" min="1" step="1" placeholder="例如：1">
          </div>
        </div>
        <button id="createLeagueBtn" class="primary" type="button">建立幫會聯賽</button>
      </section>

      <section class="panel stack">
        <p>個人戰績匯入（CSV）</p>
        <div class="grid-3">
          <div class="summary-box">檔案數：<strong id="previewFileCount">0</strong></div>
          <div class="summary-box">隊伍數：<strong id="previewTeamCount">0</strong></div>
          <div class="summary-box">預估筆數：<strong id="previewRowCount">0</strong></div>
        </div>
        <div class="field">
          <label for="leagueSelect">對應聯賽</label>
          <select id="leagueSelect">
            <option value="">請先選擇聯賽</option>
          </select>
        </div>
        <div class="field">
          <label for="csvFileInput">戰績 CSV（可多檔）</label>
          <input id="csvFileInput" type="file" accept=".csv,text/csv" multiple>
          <div id="filenameHint" class="hint">檔名格式：時間_幫會A_幫會B.csv（可自動帶入幫會）</div>
          <ul id="selectedFilesList" class="file-list"></ul>
        </div>
        <button id="importStatsBtn" class="secondary" type="button">匯入個人戰績</button>
      </section>

      <section class="panel stack">
        <p>近期聯賽清單</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>場次</th>
                <th>幫會 A</th>
                <th>幫會 B</th>
              </tr>
            </thead>
            <tbody id="leagueTableBody">
              <tr><td colspan="4">尚無資料</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>

    <div id="status" aria-live="polite"></div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
