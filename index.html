<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sword of Justice Auth</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --card: #fffef9;
      --text: #1e1c18;
      --muted: #69655e;
      --accent: #0e7c66;
      --accent-hover: #0b6653;
      --danger: #b42318;
      --border: #d8d3c8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #efe7d6 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #d8ece7 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-hover);
    }

    .secondary {
      background: #ede8dc;
      color: var(--text);
    }

    .danger {
      background: #fee4e2;
      color: var(--danger);
    }

    .oauth {
      background: #e6f1ee;
      color: #11463c;
    }

    .oauth:hover {
      background: #d2e7e1;
    }

    .divider {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin: 2px 0;
    }

    .oauth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    #status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>登入系統</h1>
    <p>先完成 GitHub Pages + Supabase 的基本會員登入。</p>

    <section id="authArea" class="stack">
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <input id="password" type="password" placeholder="Password (至少 6 碼)" autocomplete="current-password">
      <div class="row">
        <button id="signupBtn" class="secondary" type="button">註冊</button>
        <button id="loginBtn" class="primary" type="button">登入</button>
      </div>
      <div class="divider">或使用第三方登入</div>
      <div class="row">
        <button id="googleLoginBtn" class="oauth oauth-btn" type="button" aria-label="使用 Google 登入">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-.9 2.2-1.9 2.9l3 2.3c1.7-1.6 2.7-4 2.7-6.9 0-.7-.1-1.4-.2-2.1H12z"/>
            <path fill="#34A853" d="M12 22c2.4 0 4.4-.8 5.9-2.2l-3-2.3c-.8.6-1.8 1-2.9 1-2.3 0-4.3-1.6-5-3.7H3.9v2.4C5.4 20.2 8.4 22 12 22z"/>
            <path fill="#4A90E2" d="M7 14.8c-.2-.6-.3-1.2-.3-1.8s.1-1.2.3-1.8V8.8H3.9C3.3 10 3 11 3 13s.3 3 .9 4.2L7 14.8z"/>
            <path fill="#FBBC05" d="M12 7.5c1.3 0 2.5.5 3.4 1.3l2.6-2.6C16.4 4.8 14.4 4 12 4 8.4 4 5.4 5.8 3.9 8.8L7 11.2c.7-2.1 2.7-3.7 5-3.7z"/>
          </svg>
          <span>Google 登入</span>
        </button>
        <button id="discordLoginBtn" class="oauth oauth-btn" type="button" aria-label="使用 Discord 登入">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#5865F2" d="M20.3 5.4A16.9 16.9 0 0 0 16.1 4c-.2.4-.5 1-.7 1.4a15.8 15.8 0 0 0-4.8 0c-.2-.4-.5-1-.7-1.4-1.5.2-2.9.7-4.2 1.4C3 9.1 2.3 12.7 2.6 16.2a17 17 0 0 0 5.1 2.6c.4-.6.8-1.2 1-1.9-.6-.2-1.2-.5-1.7-.8.1-.1.2-.2.3-.2 3.3 1.6 6.9 1.6 10.1 0l.3.2c-.5.3-1.1.6-1.7.8.3.7.6 1.3 1 1.9 1.9-.5 3.6-1.4 5.1-2.6.4-4.1-.6-7.7-2.8-10.8zM9.9 14.1c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2zm4.2 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2z"/>
          </svg>
          <span>Discord 登入</span>
        </button>
      </div>
    </section>

    <section id="userArea" class="stack hidden">
      <p>已登入：<strong id="userEmail"></strong></p>
      <p>登入方式：<strong id="providerName"></strong></p>
      <button id="logoutBtn" class="danger" type="button">登出</button>
    </section>

    <div id="status" aria-live="polite"></div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
