<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜幫會聯賽清單</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="page-center stats-page">
  <main class="card stats-main">
    <div class="topbar">
      <div>
        <h1>有夢最美</h1>
        <p>幫會聯賽清單</p>
      </div>
      <div class="topbar-actions">
        <a class="nav-btn" href="./dashboard.html">前往匯入管理</a>
        <button id="logoutBtn" class="danger" type="button">登出</button>
      </div>
    </div>

    <section class="stack">
      <section class="panel stack">
        <div class="field">
          <input id="enemyGuildSearch" type="text" placeholder="搜尋敵方幫會">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>日期</th><th>場次</th><th>我方</th><th>我方人數</th><th>敵方</th><th>敵方人數</th><th>操作</th></tr></thead>
            <tbody id="leagueListBody"><tr><td colspan="7">尚無資料</td></tr></tbody>
          </table>
        </div>
      </section>
    </section>

    <div id="status" aria-live="polite"></div>
  </main>
  <script src="./config.js"></script>
  <script type="module" src="./stats.js"></script>
</body>
</html>
