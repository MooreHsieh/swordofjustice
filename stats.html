<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜統計總覽</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="page-center stats-page">
  <main class="card stats-main">
    <div class="topbar">
      <div>
        <h1>有夢最美</h1>
        <p>幫會聯賽統計總覽</p>
      </div>
      <div class="topbar-actions">
        <a class="nav-btn" href="./dashboard.html">前往匯入管理</a>
        <button id="logoutBtn" class="danger" type="button">登出</button>
      </div>
    </div>

    <section class="stack">
      <p>已登入：<strong id="userEmail"></strong></p>
      <p>登入方式：<strong id="providerName"></strong></p>

      <section class="panel stack">
        <p>核心統計</p>
        <div class="grid-3">
          <div class="summary-box">聯賽總數：<strong id="leagueCount">0</strong></div>
          <div class="summary-box">戰績總筆數：<strong id="recordCount">0</strong></div>
          <div class="summary-box">最近場次：<strong id="latestMatch">-</strong></div>
        </div>
      </section>

      <section class="panel stack">
        <p>最近 10 場聯賽</p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>日期</th><th>場次</th><th>幫會 A</th><th>幫會 B</th></tr></thead>
            <tbody id="recentLeagueBody"><tr><td colspan="4">尚無資料</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="panel stack">
        <p>最近聯賽圖表</p>
        <div class="grid-2">
          <div class="chart-card">
            <h3>幫會戰績排行（擊敗+助攻）</h3>
            <div id="guildChart" class="chart-list"></div>
          </div>
          <div class="chart-card">
            <h3>職業分佈（參戰人次）</h3>
            <div id="classChart" class="chart-list"></div>
          </div>
        </div>
      </section>
    </section>

    <div id="status" aria-live="polite"></div>
  </main>
  <script src="./config.js"></script>
  <script type="module" src="./stats.js"></script>
</body>
</html>
