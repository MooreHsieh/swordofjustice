<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜人員總計</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="totals-page">
  <header class="totals-top-header">
    <a class="detail-home" href="./stats.html">⌂</a>
    <div class="totals-head-left">
      <h1>有夢最美 人員統計</h1>
    </div>
    <div class="topbar-actions">
      <button id="logoutBtn" class="danger" type="button">登出</button>
    </div>
  </header>

  <main class="totals-main">
    <section class="totals-toolbar">
      <div class="field">
        <input id="playerSearch" type="text" placeholder="搜尋暱稱或職業">
      </div>
    </section>
    <section class="totals-content">
      <div class="table-wrap totals-table-wrap">
        <table>
          <thead>
            <tr>
              <th class="detail-sort" data-sort="player_name">暱稱</th>
              <th class="detail-sort" data-sort="class_name">職業</th>
              <th class="detail-sort" data-sort="avg_kills">擊敗(平均)</th>
              <th class="detail-sort" data-sort="avg_assists">助攻(平均)</th>
              <th class="detail-sort" data-sort="avg_resources">資源(平均)</th>
              <th class="detail-sort" data-sort="avg_pvp">人傷(平均)</th>
              <th class="detail-sort" data-sort="avg_bld">塔傷(平均)</th>
              <th class="detail-sort" data-sort="avg_heal">治療(平均)</th>
              <th class="detail-sort" data-sort="avg_tank">承傷(平均)</th>
              <th class="detail-sort" data-sort="avg_heavy">重傷(平均)</th>
              <th class="detail-sort" data-sort="avg_feather">化羽(平均)</th>
              <th class="detail-sort" data-sort="avg_bone">焚骨(平均)</th>
              <th class="detail-sort" data-sort="wins">勝場</th>
              <th class="detail-sort" data-sort="losses">敗場</th>
              <th class="detail-sort" data-sort="matches">總場次</th>
              <th class="detail-sort" data-sort="win_rate">勝率</th>
              <th class="detail-sort" data-sort="kills_sum">擊敗(加總)</th>
              <th class="detail-sort" data-sort="assists_sum">助攻(加總)</th>
              <th class="detail-sort" data-sort="resources_sum">資源(加總)</th>
              <th class="detail-sort" data-sort="pvp_sum">人傷(加總)</th>
              <th class="detail-sort" data-sort="bld_sum">塔傷(加總)</th>
              <th class="detail-sort" data-sort="heal_sum">治療(加總)</th>
              <th class="detail-sort" data-sort="tank_sum">承傷(加總)</th>
              <th class="detail-sort" data-sort="heavy_sum">重傷(加總)</th>
              <th class="detail-sort" data-sort="feather_sum">化羽(加總)</th>
              <th class="detail-sort" data-sort="bone_sum">焚骨(加總)</th>
              <th class="detail-sort" data-sort="k_per_h">擊殺/重傷</th>
              <th class="detail-sort" data-sort="dmg_per_kill">傷害/擊殺</th>
            </tr>
          </thead>
          <tbody id="totalsBody"><tr><td colspan="28">尚無資料</td></tr></tbody>
        </table>
      </div>
    </section>
    <div id="status" aria-live="polite"></div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./stats-totals.js"></script>
</body>
</html>
