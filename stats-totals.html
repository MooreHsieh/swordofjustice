<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有夢最美｜人員總計</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./shared.css">
</head>
<body class="totals-page">
  <header class="totals-top-header">
    <a class="detail-home" href="./stats.html">⌂</a>
    <div class="totals-head-left">
      <h1>有夢最美 人員統計</h1>
    </div>
    <div class="topbar-actions">
      <button id="logoutBtn" class="danger" type="button">登出</button>
    </div>
  </header>

  <main class="totals-main">
    <section class="totals-toolbar">
      <div class="field">
        <input id="playerSearch" type="text" placeholder="搜尋暱稱或職業">
      </div>
    </section>
    <section class="totals-content">
      <div class="table-wrap totals-table-wrap">
        <table>
          <thead>
            <tr>
              <th>暱稱</th>
              <th>職業</th>
              <th>勝場</th>
              <th>敗場</th>
              <th>總場次</th>
              <th>勝率</th>
              <th>擊敗(平均)</th>
              <th>助攻(平均)</th>
              <th>資源(平均)</th>
              <th>人傷(平均)</th>
              <th>塔傷(平均)</th>
              <th>治療(平均)</th>
              <th>承傷(平均)</th>
              <th>重傷(平均)</th>
              <th>化羽(平均)</th>
              <th>焚骨(平均)</th>
              <th>擊敗(加總)</th>
              <th>助攻(加總)</th>
              <th>資源(加總)</th>
              <th>人傷(加總)</th>
              <th>塔傷(加總)</th>
              <th>治療(加總)</th>
              <th>承傷(加總)</th>
              <th>重傷(加總)</th>
              <th>化羽(加總)</th>
              <th>焚骨(加總)</th>
              <th>擊殺/重傷</th>
              <th>傷害/擊殺</th>
            </tr>
          </thead>
          <tbody id="totalsBody"><tr><td colspan="28">尚無資料</td></tr></tbody>
        </table>
      </div>
    </section>
    <div id="status" aria-live="polite"></div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./stats-totals.js"></script>
</body>
</html>
